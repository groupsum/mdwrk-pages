body: |-
  # ADR-1036: Renderer core and React renderer boundary
  
  ## Decision
  
  MdWrk shall separate markdown rendering responsibilities between renderer core and React renderer packages. Renderer core owns parsing, heading extraction, GFM rendering behavior, and HTML document serialization. React renderer owns component presentation, link interception, static HTML surfaces, and theme style bridging.
  
  ## Scope
  
  - Frontmatter and heading parsing.
  - GFM features, fenced code, and semantic HTML generation.
  - Static HTML body and full document serialization.
  - React rendering, link interception, and theme bridge behavior.
  
  ## Consequences
  
  - Preview and export behavior can share renderer core behavior.
  - React surfaces can evolve without changing parser and serializer semantics.
  - SPECs must distinguish renderer core obligations from React adapter obligations.
