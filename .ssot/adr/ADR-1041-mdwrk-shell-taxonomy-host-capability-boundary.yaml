body: |-
  # ADR-1041: MdWrk shell taxonomy and host capability boundary
  
  ## Decision
  
  MdWrk shall define supported shells explicitly and separate shared client shell behavior from host-only capabilities. Browser, PWA, Electron desktop, and Capacitor Android shells shall reuse the shared client shell where possible while declaring capability differences through host adapters.
  
  ## Scope
  
  - Browser shell runtime behavior.
  - PWA installed-shell runtime behavior.
  - Electron desktop shell runtime behavior.
  - Capacitor Android shell runtime behavior.
  - Runtime labels, capability detection, and unsupported capability states.
  
  ## Consequences
  
  - Shell-specific behavior must be documented and tested per shell.
  - Shared UIX and extension behavior remains portable across host shells.
  - Native-only features must not leak into browser or PWA assumptions.
