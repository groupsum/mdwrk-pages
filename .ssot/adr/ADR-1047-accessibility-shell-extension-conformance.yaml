body: |-
  # ADR-1047: Accessibility as shell and extension conformance

  ## Decision

  MdWrk shall treat accessibility as a conformance requirement for shell surfaces, editor behavior, command palettes, settings, modals, extensions, and public lander surfaces.

  MdWrk shall conform to WCAG 2.1 AA for user-facing web UI. For color contrast, this includes WCAG 2.1 Success Criterion 1.4.3 Contrast (Minimum): normal text and images of text shall provide at least 4.5:1 contrast against their rendered background, while large-scale text shall provide at least 3:1. Incidental, inactive, decorative, and logo text follow the WCAG exceptions.

  ## Scope

  - Keyboard navigation and shortcut behavior.
  - Focus order, focus restoration, and modal focus handling.
  - ARIA labels and screen-reader names for shell controls.
  - Status and update announcements where appropriate.
  - Extension-provided UI surfaces and settings forms.
  - Lander light and lander dark theme foreground/background token pairs.
  - Public-site hero, feature, article, documentation, comparison, metadata, and navigation text.

  ## Consequences

  - UI and extension features cannot be considered complete without accessibility evidence.
  - Shell, extension, lander, and theme specs must include accessibility obligations.
  - Theme tokens used for normal-size text must be validated against their normal rendered backgrounds at WCAG 2.1 AA contrast ratios.
  - Regression tests should cover behavior and contrast pairs that can be asserted without visual inspection, with screenshots retained for visual validation of affected themes.
