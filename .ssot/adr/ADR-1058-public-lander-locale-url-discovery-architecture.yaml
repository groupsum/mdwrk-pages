  # ADR-1058: Public Lander Locale URL and Discovery Architecture
  
  ## Decision
  
  MdWrk public lander localization shall use explicit, crawlable locale URL variants. The default English route remains the root canonical route, including `https://mdwrk.com/` for the home page and `/docs/quickstart/` for the default quickstart. Non-default translated variants use locale subdirectories such as `/es/docs/quickstart/`.
  
  The lander shall not use query parameters, cookies, IP geolocation, `Accept-Language`, or automatic redirects as the canonical discovery mechanism for localized public content. Locale switching is a user action and crawler discovery must work from static links, HTML alternate metadata, and sitemap alternates.
  
  Current ownership for locale slug normalization, canonical route derivation, and route-shape validation belongs to `@mdwrk/lander-core` as part of compiled-site semantics. Discovery artifact emission that consumes those canonicals belongs to `@mdwrk/lander-seo`. If slug aliasing, locale overlays, or canonical-policy branching become materially broader, they may later move into a dedicated routing package, but they are not a React concern.
  
  ## Rationale
  
  Google's multi-regional and multilingual guidance favors distinct URLs for localized variants and warns against relying on automatic redirection or request negotiation because crawlers may not discover every version. MdWrk already governs static lander discoverability through ADR-1053 and static compiler output through ADR-1055, so locale discovery belongs as a focused extension of those decisions rather than a new general SEO architecture.
  
  ## Consequences
  
  Locale metadata, route validation, hreflang alternates, sitemap alternates, visible locale switcher links, and crawler-safe rendering become first-class public lander obligations. Initial translation coverage may be partial, but any shipped localized route must be statically reachable and must not imply that the whole site is translated.
  
  The route layer must expose enough deterministic semantics that downstream breadcrumb UI and `BreadcrumbList` schema can be emitted without re-deriving locale/canonical relationships in product-host code.
