body: |-
  # ADR-1059: Schema.org standards baseline and structured data authority
  
  ## Decision
  
  MdWrk public structured data shall use the generated Schema.org schema registry as the authoritative contract surface for every promoted generated artifact. This authority now applies across generated `types`, `properties`, `enumerations`, and `datatypes`, not only the earlier curated page-family subset.
  
  Schema.org JSON-LD remains the canonical serialization. Every promoted generated artifact shall preserve and validate every present schema-valid field unless a narrower fail-closed exception is explicitly governed by SPEC.
  
  ## Rationale
  
  The repository has moved from a curated structured-data frontier into a generator-backed fused surface. The earlier baseline covered standards selection and visible parity, but it did not yet state that generated schemas are the source of truth for full-field support and certification across all generated artifact kinds.
  
  Without this decision, the repo can drift into partial-field wrappers, demo-only placeholder payloads, and fused visible components that expose only a small authored subset of a governed artifact.
  
  ## Consequences
  
  1. Generated Schema.org schemas are the baseline authority for promoted generated artifacts.
  2. Promoted generated artifacts require full-field support, schema-backed validation, and certification gates.
  3. Fail-closed omissions remain allowed only when the omission itself is explicitly governed and tested.
  4. Demo discoverability shall not hide implemented generated artifacts behind misleading filters.
