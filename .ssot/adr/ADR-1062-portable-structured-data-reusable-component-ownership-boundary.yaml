body: |-
  # ADR-1062: Portable Structured Data Reusable Component Ownership Boundary
  
  ## Decision
  
  Portable structured-data ownership in MdWrk shall cover the full promoted generated artifact surface. The ownership boundary includes generator-backed reusable surfaces for `types`, `properties`, `enumerations`, and `datatypes`, together with their visible fused components, structured-data wrappers, and supporting certification tests.
  
  The reusable ownership model is no longer limited to a hand-curated list of high-value type components.
  
  ## Rationale
  
  The repository now exposes a generated fused semantic explorer and generated schema-backed runtime surfaces. A reusable-component boundary that only governs selected types leaves the majority of generated artifacts without a clear owner for field completeness, className parity, token coverage, or certification.
  
  ## Consequences
  
  1. Generated reusable surfaces shall have one owner path across contract, wrapper, fused rendering, and token layers.
  2. Unsupported or partial-field generated artifacts must be recorded honestly in SSOT rather than silently omitted.
  3. Ownership claims for structured-data reusable components now extend beyond page-like authored types.
