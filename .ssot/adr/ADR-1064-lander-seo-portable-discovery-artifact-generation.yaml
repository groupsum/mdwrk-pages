body: |-
  ## Decision
  
  `@mdwrk/lander-seo` shall be the authoritative reusable owner for portable lander discovery artifact generation and validation, including the basic `sitemap`, `robots`, and `llms.txt` builders consumed by richer discovery bundles.
  
  The package shall provide product-neutral builders for sitemap indexes, child sitemap URL sets, robots policy, short and full LLM discovery files, content index JSON, semantic index JSON, content registry JSON, JSON-LD graph artifacts, cache header manifest inputs, and diagnostics. Product sites such as `apps/mdwrkcom` may host or invoke those builders, but they shall not remain the long-term owner of generic discovery artifact algorithms.
  
  `@mdwrk/lander-core` shall compile pages, route semantics, normalized slugs, canonical URLs, page text, and diagnostics. It shall not own discovery artifact generation, including basic `sitemap`, `robots`, and `llms.txt` builders. Compatibility helpers shall be removed rather than retained indefinitely as transitional shims.
  
  The public root `/sitemap.xml` shall be a sitemap index, not a page URL set. It shall contain only child sitemap locations. Page URLs shall live in child URL-set documents under a deterministic sitemap base path such as `/sitemaps/*.xml`.
  
  Product-specific content packs, including `@mdwrk/mdwrkcom-content-pack`, shall own product prose, source metadata, assets, sitemap inputs, and mirrored generated artifacts. They shall not own generic SEO/AEO/AiEO artifact generation logic.
  
  ## Rationale
  
  The current public lander pipeline proves the discovery surface in mdwrkcom, but much of that behavior is reusable across product landers. Keeping generic artifact generation inside `apps/mdwrkcom` makes reuse by downstream documentation sites harder and blurs app, content-pack, SEO, and rendering boundaries.
  
  Root sitemap indexes make the reusable contract scale across downstream product landers. A downstream site can emit one stable `/sitemap.xml` while splitting page URLs by page family, locale, package, content pack, or other governed grouping without changing crawler entry points.
  
  Moving the reusable builders into `@mdwrk/lander-seo` preserves the existing package split: content packs own product truth, `@mdwrk/lander-core` owns compilation and route metadata, `@mdwrk/lander-react` owns rendering, `@mdwrk/structured-data` owns typed schema builders, and `@mdwrk/lander-seo` owns generated discovery artifacts and their validation gates.
