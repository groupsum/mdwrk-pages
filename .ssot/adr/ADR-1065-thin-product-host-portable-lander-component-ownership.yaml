body: |-
  # ADR-1065: Thin Product Host And Portable Lander Component Ownership
  
  ## Decision
  
  Product applications in the public lander family, including `apps/mdwrkcom`, shall be thin hosts. They shall not own or implement governed lander UI components or reusable performance policy.
  
  `apps/mdwrkcom` may own product-host bootstrap code, build invocation glue, route/static-output integration, deployment integration, environment wiring, product content-pack selection, host-specific redirects, and product smoke tests. It shall not own reusable React components, page templates, docs layouts, article shells, navigation widgets, table-of-contents components, markdown viewers, structured-data components, discovery artifact algorithms, theme/class/token policy, cache classification policy, critical CSS policy, script inclusion policy, animation policy, or portable performance-budget policy for governed lander surfaces.
  
  Product-specific content belongs in product content packs such as `@mdwrk/mdwrkcom-content-pack`. Portable declaration schemas belong in `@mdwrk/lander-content-contract`. Portable validation, normalization, indexing, render-model compilation, cache metadata, header lookup, critical CSS profile evaluation, route-aware script facts, and performance-budget evaluation belong in `@mdwrk/lander-core` unless a narrower accepted ADR assigns them elsewhere. Governed visible React rendering and visual component implementations belong in `@mdwrk/lander-react`. Governed JSON-LD React wrappers and schema-intent render registries belong in `@mdwrk/lander-react-structured-data`. Lander styling contracts, semantic classes, token policy, reduced-motion defaults, and animation constraints belong in `@mdwrk/lander-theme`. Portable discovery artifact generation belongs in `@mdwrk/lander-seo`.
  
  Product hosts may adapt portable outputs to concrete deployment runtimes. For example, mdwrkcom may map generated header intent into nginx configuration and post-deploy smoke checks. That host mapping remains an adapter of portable lander behavior, not an app-local source of truth for the behavior.
  
  ## Rationale
  
  The public lander package family is intended to be reusable by downstream product and documentation sites. If `apps/mdwrkcom` implements lander components or performance policy directly, mdwrkcom becomes an implicit non-reusable reference implementation and downstream landers cannot inherit the behavior.
  
  A thin-host boundary keeps product truth in content data, keeps rendering and performance behavior in reusable packages, and makes package responsibility testable. It also prevents app-local React components, CSS rules, cache tables, or deployment-specific scripts from becoming shadow implementations of governed lander behavior.
  
  ## Consequences
  
  1. `apps/mdwrkcom` is a host/bootstrap package, not a component or portable performance-policy package.
  2. Governed lander UI and performance behavior currently implemented under `apps/mdwrkcom` must either move to reusable lander packages or be explicitly classified as temporary migration debt.
  3. `@mdwrk/lander-react` is the default owner for governed visible lander React components unless a narrower accepted ADR assigns ownership elsewhere.
  4. `@mdwrk/lander-react-structured-data` is the default owner for governed JSON-LD React wrappers and structured-data intent registries unless a narrower accepted ADR assigns ownership elsewhere.
  5. `@mdwrk/lander-core` is the default owner for portable cache metadata, header lookup, critical-path validation, route-aware script gating facts, and performance-budget evaluation unless a narrower accepted ADR assigns ownership elsewhere.
  6. `@mdwrk/lander-theme` is the default owner for portable styling policy, reduced-motion defaults, semantic classes, and animation constraints.
  7. `@mdwrk/mdwrkcom-content-pack` may declare visible component intent, page structure, navigation, sections, metadata, and assets as data, but must not implement React components or CSS/performance policy.
  8. Validation must fail closed when `apps/mdwrkcom` introduces or retains governed component implementations or portable performance-policy implementations outside approved host/bootstrap boundaries.
  9. Existing content-pack-driven rendering governance remains valid, but references to mdwrkcom hosting are interpreted as host/bootstrap only.
  10. Feature, test, claim, and evidence rows must track host thinness, visible reusable component ownership, JSON-LD reusable component ownership, portable performance ownership, content-pack declarations, and no-drift enforcement separately.
