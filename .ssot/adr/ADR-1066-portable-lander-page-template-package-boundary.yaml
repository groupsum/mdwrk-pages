body: |-
  # Context
  The lander package family separates content contracts, compilation, SEO, theme, markdown adaptation, React rendering, product content packs, reusable page templates, and now preset graph starters. Reusable page recipes need a package boundary that keeps rendering concerns separate from graph authoring concerns and keeps product copy outside reusable packages.
  
  # Decision
  `@mdwrk/lander-page-templates` owns reusable template primitives, page-template definitions, graph validation, topology rules, relationship resolution, link-slot resolution, navigation derivation, and PageSpec generation.
  
  `@mdwrk/lander-page-template-presets` owns authored starter graph composition and preset authoring APIs over those templates. Presets may provide named page maps, named link maps, default content seeds, and editable graph starters, but they must not own product-specific final copy.
  
  `@mdwrk/lander-react` owns reusable React rendering primitives and JSON-LD output. Content packs and apps own concrete final content, assets, slugs, downstream graph edits, publication routing, and product-host decisions.
  
  # Boundaries
  The page-template package must not depend on `apps/mdwrkcom` or any product-host implementation. The preset package may depend on `@mdwrk/lander-page-templates`, but the template package must not depend on presets. Presets are optional accelerators; they are not required to author a graph directly.
  
  # Consequences
  Downstream sites can instantiate home, feature, answer, compare, trust, support, FAQ, education, package, documentation, and legal page systems from reusable templates or from starter presets while preserving content ownership boundaries.
  
  The implementation must keep page templates, preset graph composition, content packs, and React rendering as separate ownership surfaces.
