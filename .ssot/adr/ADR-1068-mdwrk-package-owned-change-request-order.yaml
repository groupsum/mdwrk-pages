body: |-
  # Context
  The MdWrk work backlog spans package contracts, shared tokens, editor packages, renderer packages, extension packages, client and desktop apps, portable lander packages, mdwrkcom content packs, mdwrkcom host code, documentation, screenshots, and SSOT proof. Executing these items as one mixed backlog makes ownership ambiguous and allows app changes to outrun contract and token decisions.
  
  External site redeploys, domain migrations, third-party console submissions, and hosted-service operations are not package-owned runtime changes in this repository. They may be tracked in a deployment or operations system, but they must not be promoted into MdWrk repo SSOT features only because they appeared in a working checklist.
  
  # Decision
  MdWrk change requests shall be ordered by package ownership. Cross-package governance, ADR/SPEC linkage, versioning, and screenshot proof come first. Contracts and shared tokens come before package implementations. Editor and renderer package changes come before app adoption. Extension manifest and host contracts come before first-party extension changes. Portable lander contracts and packages come before mdwrkcom host adoption.
  
  Repo-owned mdwrkcom work includes host code, content-pack adoption, static build outputs, portable discovery artifact generation, and validation of generated artifacts. Repo-owned mdwrkcom work excludes redeploying unrelated existing sites and submitting sitemap.xml to Google Search Console or any equivalent external console.
  
  # Boundaries
  The order is a governance and execution contract, not a release guarantee. A package may still ship independently when its dependencies are already satisfied. Cross-package work must name all owners explicitly and must not hide product-host obligations inside reusable package work.
  
  Internal sitemap.xml generation and validation can remain a lander-seo or mdwrkcom feature. External submission of that sitemap to a third-party search console is an operational deployment task and is out of scope for this repo-owned feature checklist.
  
  # Consequences
  Operators can convert backlog items into package-owned features, tests, claims, and evidence without losing traceability. Reviewers can reject work that skips prerequisite contracts, bypasses screenshot evidence, places behavior in the wrong package, or attempts to add external redeploy/search-console tasks as MdWrk repo features.
