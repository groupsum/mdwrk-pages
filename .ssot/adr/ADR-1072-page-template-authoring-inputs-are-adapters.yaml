body: |-
  Decision:
  Markdown/frontmatter files and imperative TypeScript definitions are supported authoring adapters for page-template content packs. Neither adapter owns graph semantics. Both inputs normalize into the shared page-template source model before template resolution, relationship validation, default application, diagnostics, and PageSpec emission.
  
  Rationale:
  Operators need one Markdown file per page for normal content-pack authoring, while package authors, tests, generated catalogs, and CMS adapters need an imperative API. Supporting both inputs without a shared normalized model would create divergent graph behavior and incompatible diagnostics.
  
  Consequences:
  The lander page-template suite must expose a shared compiler core. Markdown and imperative adapters must call the same compiler. Link slots, child-page relationships, schema defaults, and generated content-pack outputs must behave identically regardless of authoring input.
