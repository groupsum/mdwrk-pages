body: |-
  Decision:
  The page-template compiler owns graph resolution for page-template content packs. Operators author pages, templates, frontmatter, and links; the compiler resolves parent-component link slots to target page instances, validates linked slugs and template compatibility, applies defaults, emits diagnostics, and generates PageSpec/content-pack artifacts.
  
  Rationale:
  The authoring surface should be declarative. Requiring operators to hand-wire graph internals creates brittle content packs and duplicates package behavior downstream.
  
  Consequences:
  Imperative graph APIs remain available for package authors and generators, but the compiler is the only authority for resolved relationships, navigation, schema defaults, and emitted PageSpec records.
