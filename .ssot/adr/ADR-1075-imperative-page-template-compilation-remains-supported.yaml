body: |-
  Decision:
  Imperative page-template compilation remains a supported public API. Tests, generated content, CMS adapters, package authors, and advanced build tools may provide source-page objects directly instead of Markdown files, but those objects must compile through the same normalized model and compiler pipeline as Markdown/frontmatter pages.
  
  Rationale:
  Markdown is the preferred operator authoring surface, but the package suite still needs deterministic code-driven compilation for automation, test fixtures, generated indexes, and custom content systems.
  
  Consequences:
  The imperative API must produce equivalent diagnostics and PageSpec output to Markdown compilation for equivalent normalized input. It must not expose a separate relationship model.
