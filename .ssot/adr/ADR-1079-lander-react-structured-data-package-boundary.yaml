body: |-
  # ADR-1079: Lander React Structured Data Package Boundary
  
  ## Decision
  
  `@mdwrk/lander-react-structured-data` shall own the generator-backed wrapper registry for all promoted generated Schema.org artifacts. Its boundary includes wrapper parity for generated `types`, `properties`, `enumerations`, and `datatypes`, along with schema-valid JSON-LD emission behavior and fail-closed handling for authored shorthand that cannot be emitted safely.
  
  Visible rendering remains owned by `@mdwrk/lander-react`, but wrapper completeness and registry discoverability are owned by the split structured-data package.
  
  ## Rationale
  
  The split package boundary was originally introduced to separate visible React rendering from JSON-LD emission. As the generated surface expanded, the package boundary must explicitly own wrapper parity for the full promoted artifact surface rather than only curated type rows.
  
  ## Consequences
  
  1. Every promoted generated artifact shall have a wrapper-level ownership path in `@mdwrk/lander-react-structured-data`.
  2. Wrapper registry coverage shall be certifiable against generated artifact inventories.
  3. Visible fused components may render helper affordances, but emitted structured data must stay schema-valid and package-owned at the wrapper layer.
