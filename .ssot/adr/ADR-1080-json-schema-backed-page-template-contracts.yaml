body: |-
  # Context
  The portable lander stack already owned reusable page-template definitions, starter presets, and structured-data rendering, but authored template payloads were not governed by exported JSON Schema assets. Validation stopped at graph topology and schema-link wiring, which meant invalid education payloads could still enter the compile path.
  
  The new education preset surface needs five canonical entities: learning path, course, module, quiz, and course test. Those authored payloads must be contract-backed and validated without moving ownership into `mdwrk`.
  
  # Decision
  `@mdwrk/lander-content-contract` owns exported JSON Schema assets, stable schema identifiers, registry helpers, and authored-payload validation helpers for page-template data.
  
  `@mdwrk/lander-page-templates` owns binding page templates to those schema identifiers and must fail closed on authored-payload validation errors before `PageSpec` generation.
  
  `@mdwrk/lander-page-template-presets` owns starter graphs that seed schema-valid data for the canonical education entities.
  
  `@mdwrk/lander-react-structured-data` continues to own JSON-LD emission and must render the structured-data intents produced by the schema-backed education templates.
  
  # Consequences
  Reusable page-template packages now publish both TypeScript contract helpers and raw JSON Schema assets.
  
  Education template graphs compile only when authored payloads satisfy their bound JSON Schemas.
  
  Downstream content packs, starter presets, and structured-data rendering stay in `mdwrk-pages`, while `mdwrk` proper remains out of runtime ownership for this lane.
