body: |-
  # Context
  `mdwrk-pages` intentionally supports a broader local Schema.org and JSON-LD surface than Google Search currently rewards. Some Google Search features are active and worth targeting directly; others are deprecated, deprecating, or constrained to narrow authoritative-site surfaces even when the underlying Schema.org type remains valid and intentionally supported locally.
  
  Without an explicit policy, gap tracking conflates three distinct questions:
  - whether Google Search has an active feature for a type,
  - whether `@mdwrk/structured-data` supports the type semantically, and
  - whether `@mdwrk/lander-react-structured-data` has a concrete runtime wrapper and registry entry for it.
  
  # Decision
  Google Search feature support is tracked separately from local Schema.org support.
  
  For active Google-targeted structured-data work, planned coverage is incomplete unless both of the following exist:
  - a structured-data builder/input surface in `@mdwrk/structured-data`, and
  - a concrete wrapper plus intent-registry entry in `@mdwrk/lander-react-structured-data`.
  
  For deprecated, deprecating, or otherwise not practically targeted Google Search features, local support may remain implemented without creating a blocker. Those cases are tracked as warnings and should recommend the preferred replacement type or feature path when one exists.
  
  `FAQPage` remains warning-only for Google Search targeting, with `QAPage` preferred for single-question user-answer content and `Article` or `TechArticle` preferred for explanatory help content.
  
  `Dataset` remains warning-only for ordinary Google Search discovery, with `Article` or `TechArticle` preferred for normal web discovery while `Dataset` may remain supported for Dataset Search use cases.
  
  # Consequences
  Support matrices, implementation planning, and package-gap audits must distinguish active Google feature gaps from local-runtime support gaps.
  
  Google-targeted implementation work is complete only when both the semantic builder layer and the concrete React rendering layer exist.
  
  Deprecated or narrow Google Search features do not force removal of locally supported Schema.org types, but they must be framed as warning-only in product and governance docs.
