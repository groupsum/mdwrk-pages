body: |-
  # ADR-1084: Generated Structured Data Artifact Family Model
  
  ## Decision
  
  The MdWrk structured-data family model shall be artifact-kind based rather than type-only. The governed family model now includes generated `types`, `properties`, `enumerations`, and `datatypes`, each with explicit expectations for schema ownership, wrapper ownership, fused rendering, `.toStructuredData` contribution support, className support, token coverage, and certification tests.
  
  ## Rationale
  
  The earlier per-type framing matched a smaller structured-data frontier. The current generator-backed surface includes artifact kinds that are not types but still need runtime, visibility, styling, and certification treatment. Continuing to model the surface as type-only causes discoverability gaps and incomplete coverage obligations.
  
  ## Consequences
  
  1. Feature and test inventories shall be grouped by generated artifact kind as needed.
  2. Generated properties, enumerations, and datatypes are first-class governed surfaces.
  3. Counts and matrices shall be derived by artifact kind rather than inferred from type-only inventories.
  4. Generated family certification shall distinguish visible fused rendering, standalone JSON-LD emission, and page-level graph contribution while requiring parity across the shared structured-data builder path.
