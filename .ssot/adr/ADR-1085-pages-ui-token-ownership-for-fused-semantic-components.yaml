body: |-
  # ADR-1085: Pages UI Token Ownership for Fused Semantic Components
  
  ## Decision
  
  `@mdwrk/pages-ui-tokens` shall own dedicated token coverage for every fused semantic artifact on the promoted generated surface. This ownership includes generated `types`, `properties`, `enumerations`, and `datatypes`, not only the earlier bespoke authored subset.
  
  Generated baseline token files are acceptable, but missing token ownership for a fused artifact is not.
  
  ## Rationale
  
  The repo now publishes a fused semantic explorer across generated artifacts. ClassName support without token ownership leaves those surfaces visually under-governed and makes matrix claims inaccurate.
  
  ## Consequences
  
  1. Every fused generated artifact shall have dedicated token ownership.
  2. Token coverage shall be enforced by matrix generation and CI gates.
  3. Existing bespoke token surfaces remain valid, but uncovered generated artifacts require generated baseline token files.
