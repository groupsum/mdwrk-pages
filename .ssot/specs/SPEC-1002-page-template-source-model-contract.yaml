body: |-
  This SPEC defines the normalized page-template source model consumed by all authoring adapters.
  
  A source page shall include template, slug, title, description, optional body, optional data, optional schema declarations, optional SEO metadata, and optional link-slot declarations. Markdown/frontmatter and imperative APIs must normalize into this model before graph resolution.
  
  Normative shape:
  - template: stable page-template id.
  - slug: canonical route path for the page instance.
  - title and description: required crawlable metadata.
  - body: optional Markdown body content.
  - links: slot-keyed arrays of target page slugs or ids.
  - data: template-specific structured values.
  - schema: page-level schema intent overrides or additions.
  - frontmatter: raw adapter metadata retained for diagnostics when applicable.
  
  The model is adapter-neutral. It must not encode Markdown-specific or TypeScript-specific behavior.
