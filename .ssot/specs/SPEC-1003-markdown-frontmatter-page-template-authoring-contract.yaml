body: |-
  This SPEC defines Markdown/frontmatter authoring for page-template content packs.
  
  Each page may be represented by one Markdown file. YAML frontmatter shall provide template, slug, title, description, optional kind, optional schema, optional links, optional data, optional SEO metadata, and optional section overrides. The Markdown body supplies page content and may be mapped into default Markdown sections when no explicit section map is provided.
  
  The adapter must parse Markdown/frontmatter into the shared source model, preserve diagnostics with file path and field context, and delegate graph resolution to the shared compiler. Markdown authoring must not require operators to call createProductSitePreset, buildPageSpecsFromGraph, resolveLinkSlots, or deriveTemplateNavigation by hand.
