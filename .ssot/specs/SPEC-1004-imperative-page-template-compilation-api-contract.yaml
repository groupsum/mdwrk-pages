body: |-
  This SPEC defines the imperative page-template compilation API.
  
  The public API shall accept product/site metadata, an array of source-page objects, optional template registries, optional preset/default registries, and compiler options. The API shall normalize source pages, resolve templates, resolve parent-component link slots to target pages, validate graph constraints, apply schema and section defaults, and emit compiled PageSpec records plus diagnostics.
  
  Imperative input must use the same normalized source model and compiler pipeline as Markdown/frontmatter input. Equivalent normalized input must produce equivalent diagnostics and PageSpec output.
