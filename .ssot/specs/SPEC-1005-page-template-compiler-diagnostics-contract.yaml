body: |-
  This SPEC defines page-template compiler diagnostics.
  
  The compiler shall produce structured diagnostics for missing linked slugs, duplicate slugs, unknown templates, invalid slots, incompatible relationship rules, missing required metadata, invalid schema intent declarations, unsupported frontmatter shapes, and unresolved preset/default references.
  
  Diagnostics shall be stable enough for CLI output, test assertions, editor integrations, and generated build reports. Diagnostics should include severity, code, message, source page slug or file, and field path when available.
