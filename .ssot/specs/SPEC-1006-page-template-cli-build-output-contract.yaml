body: |-
  This SPEC defines the page-template CLI build-time surface.
  
  The CLI shall support compile, validate, and graph/export flows over Markdown/frontmatter page directories and, where applicable, generated normalized source manifests. Compile shall emit generated content-pack TypeScript or JSON artifacts. Validate shall run the shared compiler diagnostics without writing content-pack output. Graph export shall persist resolved page nodes, link slots, relationship edges, and diagnostics for inspection.
  
  The CLI is a build-time adapter over the shared compiler. It must not implement separate graph semantics.
