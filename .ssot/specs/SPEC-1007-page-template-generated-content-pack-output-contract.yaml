body: |-
  This SPEC defines generated page-template content-pack output.
  
  Generated output shall expose compiled PageSpec records, diagnostics, graph metadata, helper lookups by slug, and relationship/link-slot helpers useful to downstream apps. TypeScript output shall be importable by Vite and package builds. JSON output shall be suitable for CI reports and graph inspection.
  
  Generated output is derived from source pages and compiler resolution. It is not the canonical authoring source when Markdown/frontmatter files are present.
