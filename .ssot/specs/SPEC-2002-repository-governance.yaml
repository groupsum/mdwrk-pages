body: |-
  # Repository Governance Specification
  
  ## Purpose
  
  This specification defines repository cleanliness, documentation governance, SSOT-only SPEC authority, scoped agent ownership, and CI-enforced conformance checks for `mdwrk-pages`.
  
  ## Validation Rules
  
  ### 1) Tree validation
  
  - Required top-level directories must exist: `packages`, `docs`, `examples`, `tools`, `.github`, `.ssot`, `.ssot/specs`.
  - Required governance files must exist: `README.md`, `CONTRIBUTING.md`, `CODE_OF_CONDUCT.md`, `LICENSE`, `AGENTS.md`, `.ssot/registry.json`, `.ssot/specs/SPEC-2001-specs-index.yaml`, and `.ssot/specs/SPEC-2002-repository-governance.yaml`.
  - The top-level `specs/` directory is disallowed because repository SPECs are maintained in the SSOT registry.

  ### 1.1) Scoped agent validation

  - Scoped `AGENTS.md` files must exist for Pages ownership boundaries:
    - `docs/AGENTS.md`
    - `examples/AGENTS.md`
    - `packages/AGENTS.md`
    - `packages/content/AGENTS.md`
    - `packages/shared/AGENTS.md`
    - `tools/AGENTS.md`
  - Existing package-local `AGENTS.md` files under `packages/lander/*` must remain in place for package-specific authoring rules.
  - Scoped agent validation must be executable from the repository root.
  
  ### 2) Doc-pointer validation
  
  - Root `README.md` must contain a `## Documentation Pointers` section.
  - Root `README.md` must reference these paths:
    - `docs/README.md`
    - `.ssot/specs/SPEC-2001-specs-index.yaml`
    - `.ssot/specs/SPEC-2002-repository-governance.yaml`
    - `CONTRIBUTING.md`
    - `CODE_OF_CONDUCT.md`
    - `LICENSE`
    - `AGENTS.md`
  
  ### 3) Root-clutter validation
  
  - Top-level repository files and folders are restricted to the allowlist in `tools/governance/mdwrk-pages-agent-hygiene.test.mjs`.
  - New top-level files must be intentionally added to the allowlist with a governance review.
  - Generated screenshots, browser captures, and media artifacts must not be written at the repository root.
  - Root-level media files (`*.avif`, `*.gif`, `*.jpg`, `*.jpeg`, `*.png`, `*.svg`, `*.webp`) are disallowed and must live under an intentional `artifacts/` subdirectory.
  
  ### 4) Generated-artifact protection
  
  - Generated artifact roots must be ignored unless they are intentionally promoted into `docs/assets/` or package-owned fixtures.
  - Page-template demo screenshots that are part of documentation belong under `docs/assets/page-template-demo/`.
  
  ### 5) Claim-language lint
  
  - Root-level public overview documentation must not claim unsupported certification status.
  - Prohibited language includes absolute statements asserting final/full certification without evidence links.
  - Claims must be evidence-linked and scope-bounded.
  
  ### 6) WIP-notes validation
  
  - `WIP*.md` and `*WIP*.md` files are disallowed at the repository root.
  - Temporary work notes should live under `docs/current-state/` and be converted to durable docs before merge.
  
  ### 7) Release-note validation
  
  - Any `.changeset/*.md` file except `.changeset/README.md` must include:
    - A frontmatter summary block (`---`)
    - At least one package bump entry (`'@scope/pkg': patch|minor|major`)
  
  ## Test And CI Requirements
  
  - Each governance rule must have a dedicated validation command.
  - CI must execute all governance checks in pull requests and pushes.
  - Failure messages must reference this SSOT specification file to guide maintainers.
