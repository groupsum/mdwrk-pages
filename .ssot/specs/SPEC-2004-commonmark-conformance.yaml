body: |-
  # CommonMark Conformance Specification
  
  ## Purpose
  
  Define the CommonMark conformance requirements for MdWrk parser, renderer, preview, and export surfaces.
  
  ## Requirements
  
  - CommonMark 0.31.2 remains the frozen normative core.
  - CommonMark tests must be distinguishable from GFM and custom-profile tests.
  - Failures must identify whether they are parser, renderer, preview, export, or adapter failures.
  - CommonMark behavior must remain available when GFM and MdWrk additive profiles are disabled.
  - CommonMark certification claims require evidence from the official corpus lane or an explicitly scoped substitute approved by ADR.
  
  ## 2026 SSOT Coverage Update
  
  CommonMark remains the normative CM baseline for parser, renderer, preview, and export surfaces. GFM and CFM claims must identify how they extend CM without weakening CM conformance evidence.
  
  Failures must continue to label whether they belong to parser, renderer, preview, export, adapter, or shell integration boundaries. Preview/export surfaces that depend on profile choice must disclose active profile state.
