body: |-
  # Custom Flavored Markdown Specification
  
  ## Purpose
  
  Define CFM, the Custom Flavored Markdown profile.
  
  ## Requirements
  
  - CFM is additive to CommonMark and GFM.
  - CFM behavior must be opt-in unless a future ADR changes the default profile.
  - CFM syntax and preview affordances must be documented as CFM-specific.
  - CFM must preserve round-trip behavior for source text unless a transform is explicitly user-invoked.
  - CFM preview/export must disclose active custom profile behavior.
  - CFM features require parser, previewer, settings, and evidence coverage before release claims.
  
  ## 2026 SSOT Coverage Update
  
  CFM is the single MdWrk custom flavored markdown profile. CFM parser behavior, CFM previewer behavior, extension-provided transforms, and generated artifact behavior must remain additive to CM and GFM.
  
  CFM behavior must be named, gated, configurable where appropriate, and disclosed in preview/export/conformance surfaces whenever it affects output.
