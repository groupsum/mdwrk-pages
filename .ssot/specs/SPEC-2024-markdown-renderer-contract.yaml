body: |-
  # SPEC-2024: Markdown Renderer Contract
  
  ## Requirements
  
  Renderer core must own frontmatter parsing, heading extraction, GFM feature rendering, fenced code rendering, semantic HTML generation, and HTML document serialization. React renderer must own presentation, link interception, static HTML rendering, and theme style bridging.
  
  ## Evidence
  
  Evidence must cover parser outputs, HTML serialization, React rendering, link interception, static HTML surfaces, and default GFM behavior.
