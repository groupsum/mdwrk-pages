body: |-
  # SPEC-2028: UIX CSS Token And Chassis Contract
  
  ## Requirements
  
  UIX CSS tokens must govern editor and markdown rhythm, chassis dimensions, header constraints, status bar behavior, zoom-independent layout dimensions, and theme-wide token availability. Themes may vary visual treatment but must preserve shared token meaning.
  
  ## Evidence
  
  Evidence must cover alignment tokens, chassis fit, status overflow behavior, zoom token contracts, theme token availability, and markdown spacing constraints.
