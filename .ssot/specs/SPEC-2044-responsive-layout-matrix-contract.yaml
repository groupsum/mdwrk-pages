body: |-
  # SPEC-2044: Responsive Layout Matrix Contract
  
  ## Requirements
  
  Responsive layout behavior must be specified across browser, PWA, Electron desktop, Android when in scope, mobile portrait, mobile landscape, tablet, desktop, ultra-wide, and visual-keyboard modes. Breakpoint tokens, pane sizing, compaction, iconized controls, half-screen keyboard behavior, and orientation-specific shell rules must be stable.
  
  ## Evidence
  
  Evidence must identify shell, viewport, orientation, breakpoint band, visual-keyboard state where relevant, and affected shell regions.
