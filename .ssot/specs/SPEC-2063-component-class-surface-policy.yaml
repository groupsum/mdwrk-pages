body: |-
  # SPEC-2063: Component Class Surface Policy
  
  ## Scope
  
  This SPEC governs CSS class surfaces, component ownership, and theme styling responsibilities for MdWrk application, extension, and portable lander components.
  
  ## Requirements
  
  Governed app, extension, and portable lander component source must use named component classes and tokenized CSS contracts for shell, pane, editor, preview, settings, action rail, workspace, extension, and governed structured-data reusable surfaces. Tailwind-style utility class tokens are out of bounds in governed component source roots.
  
  Covered source roots must include app-owned component surfaces, first-party extension component surfaces that participate in the shared UIX shell, and lander-owned reusable structured-data component or composition surfaces in `packages/lander/lander-react` when those surfaces are part of governed public behavior.
  
  Disallowed patterns must include inline utility-token class fragments that bypass the governed class-name and token contract.
  
  Conformance evidence must include a repository test lane that scans governed component source for disallowed utility-token patterns and fails when new violations are introduced.
  
  1. Governed components shall expose stable, named class surfaces rather than relying on incidental DOM structure.
  2. Component packages shall own the class names for their rendered surfaces.
  3. Theme packages shall style owned class surfaces through documented tokens and component selectors.
  4. Viewport and aspect-ratio breakpoints shall remain defined once in `client/public/css/base/viewports.css`.
  5. Themes shall provide unique styling per viewport/aspect/device band without redefining the breakpoint contract.
  6. App packages may compose governed components but shall not define parallel class systems for portable component surfaces.
  7. Content packs may declare component intent but shall not define implementation class surfaces.
  8. `@mdwrk/lander-content-contract` shall define portable component intent values, not CSS implementation details.
  9. `@mdwrk/lander-core` shall compile component intent to stable render-model identifiers without importing CSS or React.
  10. `@mdwrk/lander-react` shall own named class surfaces for portable lander components, including structured-data visible components.
  11. `@mdwrk/lander-theme` shall own theme styling for lander-react class surfaces.
  12. `apps/mdwrkcom` shall consume lander-react class surfaces and theme packages rather than creating app-local replacements for governed lander component classes.
  13. App-local component or class forks are allowed only as explicitly tracked migration work with a removal path.
  14. Tests shall fail when governed component class surfaces drift from documented package ownership.
  15. Screenshot validation shall cover all views, modes, panes, modals, and themes affected by governed component class surfaces.
  
  ## Acceptance
  
  Evidence must cover governed source-root selection, disallowed utility-token detection, passing component class policy tests, representative app and extension component surfaces that remain on named class-name contracts, representative lander-owned structured-data reusable surfaces that remain on the same policy, content-pack intent, core render-model identifiers, lander-react output, theme styling, mdwrkcom hosting, tests, claims, and evidence without app-local duplication.
