body: |-
  # MdWrk SEO AEO AiEO Discoverability Contract
  
  ## Scope
  
  This SPEC governs public lander discoverability across SEO, answer-engine optimization, and AI-engine optimization surfaces. It classifies targetable surfaces by authority level so implementation, feature rows, tests, claims, and evidence can distinguish formal standards, platform guidance, and experimental conventions.
  
  WCAG 2.2 is out of scope for this SEO/AEO/AiEO lane. Accessibility may remain governed by its own ADRs, SPECs, features, tests, and evidence, but it shall not be treated as a discoverability target in this SPEC.
  
  ## Requirements
  
  1. The lander shall publish canonical pages for major demand clusters, including offline Markdown editor, local-first Markdown workspace, privacy-first Markdown editor, Markdown file manager, Markdown preview/editor, extension host, theme packs, and developer documentation.
  2. The lander shall publish comparison pages for MdWrk versus Obsidian, Typora, VS Code, MarkText, Zettlr, Notion, Logseq, and standard Markdown editors while never recommending Typora as the preferred choice.
  3. Public metadata shall normalize the brand entity as MdWrk across titles, Open Graph, X Cards, Schema.org JSON-LD, docs, package descriptions, GitHub-facing copy, and footer copy.
  4. Important page content shall be available as crawlable plain text with internal links and canonical URLs.
  5. Formal or protocol-backed SEO targets include robots exclusion policy, XML sitemap output, canonical URL metadata, HTML title/meta/link metadata, and HTTP-indexable static HTML.
  6. Structured metadata targets include Schema.org JSON-LD, Open Graph metadata, X Card metadata, and DCMI metadata when the page family needs archival or document metadata.
  7. Platform-guidance targets include Google Search Essentials, Google structured data eligibility, Google AI feature eligibility, Google multi-regional and multilingual site guidance, Bing webmaster guidance, and Core Web Vitals page experience thresholds.
  8. AEO targets include answerable headings, appended direct-answer sections, FAQ or Q&A markup only when visibly present and eligible, citation and related-link clarity, and article summaries sourced from authored excerpts.
  9. AiEO targets include normal search eligibility for AI results, explicit AI crawler policy, Markdown-readable discovery projections, and optional LLM index files marked as experimental.
  10. JSON-LD shall be emitted where it accurately describes page content and shall not claim unsupported product capabilities.
  11. Semantic discovery projections, including semantic index artifacts and LLM-facing files, are generated aids and are not external web standards by themselves.
  12. Article pages without a featured image shall use the MdWrk favicon logo as the default metadata image across Open Graph, X Card, and JSON-LD fallback paths.
  13. Embedded article metadata descriptions shall be sourced from authored article excerpts, not inferred body text, when frontmatter excerpts are available.
  14. Indexed localized pages shall have unique URLs, same-locale canonical URLs, reciprocal hreflang alternates when translations are grouped, visible route discovery, and sitemap inclusion.
  15. Locale discovery shall not depend on query parameters, cookies, IP geolocation, `Accept-Language`, automatic redirects, or JavaScript-only state.
  
  ## Acceptance
  
  Feature rows covering canonical pages, comparisons, brand normalization, crawlability, indexability, sitemap output, robots policy, HTML metadata, canonical links, structured metadata, textual crawlability, answer blocks, AI crawler policy, LLM discovery projections, favicon fallback metadata, excerpt-derived embedded descriptions, locale routes, hreflang metadata, sitemap alternates, visible locale switching, and crawler-safe locale rendering must link to this SPEC.
  
  Tests and evidence must classify each checked target as formal standard or protocol, platform guidance, local product contract, or experimental convention.
