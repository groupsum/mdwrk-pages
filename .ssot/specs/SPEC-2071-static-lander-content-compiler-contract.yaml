body: |-
  # Static Lander Compiled Site and Route Contract
  
  ## Scope
  
  This SPEC governs compiled page, route, canonical, locale, intent, and diagnostic semantics for portable lander content processed by `@mdwrk/lander-core`. It does not make `@mdwrk/lander-core` the authoritative owner of discovery artifact generation, breadcrumb UI, or breadcrumb structured-data emission.
  
  ## Requirements
  
  1. The compiler shall accept content-pack declarations as the authoritative input for portable lander pages when the content pack is the selected source corpus.
  2. Content-pack inputs shall include page metadata, slug data, locale metadata, navigation metadata, prose, media references, schema intent, and visible component intent.
  3. The compiler shall validate content-pack inputs through `@mdwrk/lander-content-contract`.
  4. The compiler shall compile validated content into a deterministic portable render model through `@mdwrk/lander-core`.
  5. The compiled render model shall be independent of React and browser-only APIs.
  6. The compiled render model shall preserve deterministic stable IDs for pages, sections, schema-intent nodes, and component-intent instances.
  7. The compiler shall normalize route slugs into a stable canonical route shape.
  8. The compiler shall derive canonical URLs from governed route semantics and site canonical base metadata.
  9. The compiler shall normalize locale route semantics, including default-route and localized-subdirectory behavior.
  10. The compiler shall fail closed when localized routes use query parameters or when a non-default locale route is outside its locale subdirectory.
  11. The compiler shall expose enough route hierarchy semantics for downstream breadcrumb UI and `BreadcrumbList` schema generation.
  12. The compiler shall extract internal links, page text, and crawlable content diagnostics from compiled content.
  13. The compiler shall compile schema intent into a portable non-React representation consumable by `@mdwrk/structured-data`, `@mdwrk/lander-react`, and `@mdwrk/lander-seo`.
  14. The compiler shall not own breadcrumb UI rendering.
  15. The compiler shall not own breadcrumb structured-data rendering.
  16. The compiler shall not own `sitemap`, `robots`, `llms.txt`, `llms-full.txt`, content index, semantic index, content registry, or JSON-LD discovery bundle generation.
  17. Compiler diagnostics shall identify content-pack path, page ID, component intent ID, schema intent ID, and validation reason where available.
  18. Unsupported component or schema intent shall fail closed unless explicitly marked out of bounds in SSOT.
  19. The compiler shall keep package boundaries clear: content contract validates, lander-core compiles compiled-site semantics, structured-data builds schema primitives, lander-react renders React surfaces, lander-seo emits discovery artifacts, and product hosts host the result.
  
  ## Acceptance
  
  Package and workspace tests for `@mdwrk/lander-core` must prove content-contract validation, compiled render-model determinism, route normalization, canonical derivation, locale route semantics, internal-link extraction, page-text extraction, schema-intent compilation, breadcrumb-route semantics export, and fail-closed absence of discovery-builder ownership from the public core surface.
  
  Feature and test rows for core render-model compilation, route semantics, canonical derivation, locale-aware route normalization, breadcrumb-route semantics export, schema-intent compilation, and content-pack validation must link to this SPEC.
