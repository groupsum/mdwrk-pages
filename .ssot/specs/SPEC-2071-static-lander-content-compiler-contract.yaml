body: |-
  # Static Lander Content Compiler Contract
  
  ## Scope
  
  This SPEC governs the MdWrk.com static compiler, source content contract, generated discovery artifacts, locale-aware static output, deployment-independent verification gate, and the content-pack-driven portable lander render model.
  
  ## Requirements
  
  1. Each source page shall use `mdwrk.page.v1` YAML frontmatter that validates against the page JSON Schema before entering the normalized content registry.
  2. Source pages shall use canonical slugs, metadata-only frontmatter, and Markdown body content that remains readable without client-side rendering.
  3. The compiler shall generate static HTML for every public canonical route.
  4. The compiler shall generate page-level JSON-LD blocks and a `jsonld-graph.json` projection that remain aligned with canonical routes and supported Schema.org graph shapes.
  5. The compiler shall generate `sitemap.xml` with canonical public URLs that are intended for discovery.
  6. The compiler shall generate `robots.txt` from the governed crawler policy and shall not hardcode deployment-specific port exposure or local-only targets.
  7. The compiler shall generate `llms.txt` and `llms-full.txt` as experimental LLM discovery projections, not as formal standards-backed compliance artifacts.
  8. The compiler shall generate Markdown mirrors for public pages where mirror content improves static readability or AI retrieval without diverging from canonical content.
  9. The compiler shall generate `content-index.json` and normalized content registry artifacts for build-time verification and downstream reporting.
  10. Visible answer and FAQ rendering shall be generated only when the source metadata or body content provides matching visible content.
  11. Internal link integrity, canonical URL integrity, JSON-LD validity, sitemap coverage, robots policy output, LLM index coverage, Markdown mirror coverage, static readability, registry integrity, and content registry integrity shall be checked before deployment.
  12. Locale-aware source metadata shall be normalized into canonical route URLs, HTML language attributes, JSON-LD `inLanguage`, generated content indexes, and verification artifacts.
  13. The compiler shall emit reciprocal HTML `hreflang` alternates and XML sitemap alternates for complete locale groups.
  14. The compiler shall fail closed when localized routes use query parameters, when a non-default locale route is outside its locale subdirectory, when alternates are missing, or when a localized page lacks a visible locale switcher.
  15. Post-deploy smoke checks remain separate and must not block creation of the deployable artifact.
  16. The compiler shall accept content-pack declarations as the authoritative input for portable lander pages when the content pack is the selected source corpus.
  17. Content-pack inputs shall include page metadata, canonical URL data, navigation metadata, prose, media references, schema intent, and visible component intent.
  18. The compiler shall validate content-pack inputs through `@mdwrk/lander-content-contract`.
  19. The compiler shall compile validated content into a portable render model through `@mdwrk/lander-core`.
  20. The compiled render model shall be independent of React and browser-only APIs.
  21. The compiler shall preserve deterministic stable IDs for page sections, schema nodes, and component intent instances.
  22. Static JSON-LD output shall derive from compiled schema intent and `@mdwrk/structured-data` graph primitives.
  23. Static React output, when produced, shall use `@mdwrk/lander-react` as the renderer for governed lander surfaces.
  24. mdwrkcom static generation shall not hand-assemble governed lander component trees when equivalent compiled intent exists.
  25. Compiler diagnostics shall identify content-pack path, page ID, component intent ID, schema intent ID, and validation reason where available.
  26. Unsupported component or schema intent shall fail closed unless explicitly marked out of bounds in SSOT.
  27. Content-pack mirror tests shall prove parity between mdwrkcom live content/data/public surfaces and vendored content-pack declarations until the content pack becomes the sole canonical corpus.
  28. The compiler shall keep package boundaries clear: content contract validates, lander-core compiles, structured-data builds schema graph primitives, lander-react renders React surfaces, and mdwrkcom hosts the result.
  
  ## Acceptance
  
  `npm run ci -w apps/mdwrkcom` and `npm run ci:mdwrkcom` must validate source content, build the static distribution, and verify SEO, AEO, AiEO, static readability, registry integrity, JSON-LD, sitemap, robots, LLM index, Markdown mirror, internal link, international SEO gates, content-pack validation, core render-model compilation, and lander-react governed rendering before deployment.
  
  Feature and test rows for static compilation, generated sitemap, generated robots policy, generated LLM indexes, Markdown mirrors, content registry exports, JSON-LD graph projection, locale-aware routes, hreflang alternates, sitemap alternates, locale switcher output, static artifact verification, content-pack intent validation, core render-model compilation, and lander-react governed rendering must link to this SPEC.
