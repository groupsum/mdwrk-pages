body: |-
  # MdWrk JSON-LD Schema Graph Contract
  
  ## Scope
  
  This SPEC governs the Schema.org JSON-LD types, entity relationships, page-family graph shapes, supported-type implementation gates, content-pack schema declarations, structured-data builders, lander rendering, and verification artifacts that the MdWrk public lander may emit from static page metadata, article metadata, package metadata, and generated discovery artifacts.
  
  ## Requirements
  
  1. The static lander shall emit JSON-LD only when the selected Schema.org type accurately describes visible page content, authored metadata, or stable product identity.
  2. Every JSON-LD block shall use `@context: https://schema.org`, an `@graph` array, and stable `@id` values derived from canonical mdwrk.com URLs.
  3. Each page graph shall have one primary page entity. The primary entity shall be the most specific supported type that truthfully describes the page: `WebPage`, `BlogPosting`, `Article`, `TechArticle`, `SoftwareApplication`, or `SoftwareSourceCode`.
  4. Page graphs shall connect related entities with supported relationships instead of duplicating unrelated schema nodes. Supported relationships include `mainEntity`, `isPartOf`, `publisher`, `creator`, `breadcrumb`, `about`, and `mentions`.
  5. `WebPage` shall be supported for canonical public pages, including home, docs indexes, feature, comparison, trust, legal, package, and update index routes.
  6. `FAQPage` shall be supported only when the page visibly renders the same FAQ questions and answers included in structured data.
  7. `BreadcrumbList` shall be supported for pages with visible or implied route hierarchy and shall use canonical route URLs.
  8. `BlogPosting` shall be supported for product update and blog article pages with authored title, headline, excerpt or description, date metadata, canonical URL, image metadata, and publisher or creator linkage.
  9. `Organization` shall be supported for stable MdWrk identity on site-level graphs and as the publisher or creator for page entities when appropriate.
  10. `WebSite` shall be supported for the canonical mdwrk.com site identity and may include search or navigation affordances only after the visible site supports them.
  11. `SoftwareApplication` shall be supported for the MdWrk workspace product identity when the page describes the installable web application or PWA surface.
  12. `Article` shall be supported as the generic article fallback for long-form non-blog documentation or editorial pages when `BlogPosting` or `TechArticle` would overstate the content type.
  13. `TechArticle` shall be supported for technical documentation pages that explain setup, extension authoring, package usage, APIs, or operational behavior.
  14. `SoftwareSourceCode` shall be supported for package and developer pages that describe package entry points, APIs, modules, repository surfaces, or reusable source artifacts.
  15. Home page graphs shall include `WebPage`, `Organization`, `WebSite`, and `SoftwareApplication` when those entities describe stable MdWrk product and site identity.
  16. Product update and blog article graphs shall use `BlogPosting` as the primary content entity, connect it to `WebPage` with `mainEntity`, connect publisher or creator to `Organization`, and include `BreadcrumbList` and `FAQPage` only when applicable.
  17. Technical documentation graphs shall use `TechArticle` when the page teaches setup, API, package, extension, or operational behavior; otherwise they may use `WebPage` or `Article` as the primary entity.
  18. Package and developer surface graphs shall use `SoftwareSourceCode` when the page describes package entry points, APIs, modules, repository surfaces, or reusable source artifacts.
  19. Feature, comparison, trust, legal, archive, and index pages shall default to `WebPage` unless the page content clearly satisfies a more specific supported type.
  20. Open Graph, X Card, and DCMI metadata shall remain consistent with the canonical page entity and shall not contradict JSON-LD descriptions.
  21. Generated `jsonld-graph.json` shall include only supported types and shall remain aligned with page-level JSON-LD blocks emitted in static HTML.
  22. The lander shall not emit unsupported Schema.org types by ad hoc page code; new types require this SPEC to be updated first and linked feature/test coverage to be added.
  23. Supported-type implementation shall be tracked across builder support in `@mdwrk/structured-data`, reusable component or composition support in `@mdwrk/lander-react`, and mdwrkcom adoption state.
  24. New supported types are not implementation-complete until the builder layer and reusable lander layer are both covered by governed implementation and verification.
  25. When mdwrkcom uses a governed supported structured-data type, mdwrkcom shall import the lander-owned reusable component or composition surface rather than defining app-local ownership for that type.
  26. Validation shall fail closed when required fields for a supported type are missing, when JSON-LD claims content that is not visibly present, when a graph includes unrelated supported types only because they are globally supported, or when generated graph output diverges from canonical routes.
  27. Supported JSON-LD types shall be tracked as one structured-data feature per type.
  28. Supported JSON-LD types shall be tracked as one lander-react reusable component feature per type when a reusable component is required.
  29. Schema support flow shall be `mdwrkcom-content-pack` schema declarations to `lander-content-contract` validation to `lander-core` compiled schema intents to `lander-react` JSON-LD rendering to mdwrkcom host output.
  30. `@mdwrk/structured-data` shall remain framework-independent and own schema normalization, ID generation, graph assembly, and deterministic serialization helpers.
  31. Content packs shall declare schema intent as portable data and shall not own schema serialization logic.
  32. The content contract shall reject unsupported schema kinds, invalid references, and malformed schema payloads.
  33. The core compiler shall return diagnostics for schema intent failures without depending on React.
  34. A supported type is not complete until it is declarable in content, validated by contract, compiled by core, rendered by lander-react, tested, and adopted without app-local duplication or explicitly marked non-adopted.
  35. Claims shall target T3 for every supported structured-data type.
  
  ## Acceptance
  
  Feature and test rows for JSON-LD structured data, static content compilation, static artifact verification, metadata fallback images, excerpt-derived metadata, package or developer page schema output, social metadata parity, DCMI metadata parity, page-family graph validation, reusable lander structured-data component support, content-pack schema declaration, core schema-intent compilation, and mdwrkcom adoption must link to this SPEC when they exercise supported Schema.org types or graph relationships.
  
  The structured-data boundary shall close only when every supported JSON-LD type has package implementation, content declarability, contract validation, core compilation, lander-react rendering where applicable, mdwrkcom usage or explicit non-adoption, passing tests, T3 claims, and linked evidence.
