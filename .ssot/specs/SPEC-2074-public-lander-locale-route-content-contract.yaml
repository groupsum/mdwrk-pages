body: |-
  # Public Lander Locale Route and Content Contract
  
  ## Scope
  
  This SPEC governs localized source content and route shape for the MdWrk public lander. It applies to compiled route semantics owned by `@mdwrk/lander-core` and to downstream discovery/render consumers of those semantics.
  
  ## Requirements
  
  1. Page frontmatter may include `locale`, `translationOf`, and `localeGroup`.
  2. Pages without `locale` are treated as English default locale pages.
  3. The default English route stays at the root canonical path and shall not be duplicated under `/en/`.
  4. Non-default localized pages shall use `/<locale>/<canonical-path>` route prefixes, such as `/es/docs/quickstart/`.
  5. Locale values shall use BCP 47 style tags normalized for HTML `lang`, JSON-LD `inLanguage`, and hreflang output.
  6. A localized page shall identify the default source page through `translationOf`.
  7. A locale group shall contain one default English source route and zero or more localized variants.
  8. A localized page shall use one primary visible language for body content, page metadata, FAQ or answer sections, and generated mirror content.
  9. Route normalization and canonical route derivation for locale groups shall be produced by `@mdwrk/lander-core`, not reconstructed independently by product hosts.
  10. The compiled route model shall expose enough hierarchy and translation semantics for downstream breadcrumb UI, `BreadcrumbList` schema, hreflang output, and sitemap alternates.
  
  ## Acceptance
  
  Static source validation fails when localized routes omit `translationOf`, when locale groups repeat locale tags, when non-default localized routes are outside their locale subdirectory, or when locale routing uses query parameters.
