body: |-
  # SPEC-2077: Schema.org Vocabulary and JSON-LD Conformance Contract
  
  ## Scope
  
  This SPEC governs external Schema.org vocabulary authority and JSON-LD conformance for promoted generated MdWrk structured-data artifacts across `types`, `properties`, `enumerations`, and `datatypes`.
  
  ## Requirements
  
  1. Schema.org is the authoritative vocabulary for promoted generated artifacts.
  2. The generated Schema.org schema registry is the authoritative field inventory for promoted generated artifacts.
  3. Every promoted generated artifact shall preserve every present schema-valid field unless an explicit fail-closed exception is governed by SSOT.
  4. JSON-LD remains the canonical emitted serialization for promoted structured-data artifacts.
  5. Unsupported Schema.org terms shall not be promoted silently; promotion requires SSOT scope and certification coverage.
  6. Pending or meta terms remain out of bounds unless explicitly governed.
  7. Conformance tests shall verify field completeness, not only artifact presence.
  
  ## Acceptance
  
  Feature and test rows linked to this SPEC shall prove generator-backed field completeness for promoted artifact families, not only curated type selection.
