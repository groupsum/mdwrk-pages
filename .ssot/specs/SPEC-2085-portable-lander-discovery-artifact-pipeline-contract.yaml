body: |-
  ## Scope
  
  This SPEC defines the reusable discovery artifact pipeline that shall be owned by `@mdwrk/lander-seo` for portable product landers. It applies to compiled lander sites produced by `@mdwrk/lander-core` and to product hosts such as `apps/mdwrkcom`.
  
  ## Requirements
  
  1. `@mdwrk/lander-seo` shall expose a reusable discovery artifact builder that accepts a compiled lander site, page registry inputs, and generation options.
  2. The package shall expose basic `buildSitemap`, `buildRobotsTxt`, and `buildLlmsTxt` builders as part of the discovery ownership surface.
  3. The builder shall produce sitemap XML artifacts, robots text, `llms.txt`, `llms-full.txt`, `content-index.json`, `semantic-index.json`, `content-registry.json`, `jsonld-graph.json`, cache header manifest inputs, and diagnostics.
  4. `@mdwrk/lander-core` shall provide compiled pages, canonical URLs, route semantics, page text, and diagnostics as inputs to this pipeline; it shall not be the authoritative owner of the pipeline itself.
  5. Sitemap XML artifacts shall use a root sitemap index at `/sitemap.xml`.
  6. The root sitemap index shall contain only child sitemap locations and shall not contain page URL entries.
  7. Child sitemap files shall be emitted as URL-set documents under a deterministic sitemap base path such as `/sitemaps/*.xml`.
  8. Child sitemap URL sets shall include indexable canonical pages and exclude noindex pages.
  9. Child sitemap grouping shall be deterministic for the same compiled site and options.
  10. Hreflang and alternate URL entries shall be emitted in child URL-set sitemaps when locale metadata is present.
  11. Robots text shall include the public root sitemap URL and configured crawler policies without localhost, loopback, or explicit development port leakage.
  12. `llms.txt` shall provide a concise discovery projection of site facts and indexable pages.
  13. `llms-full.txt` shall include canonical page URLs and crawlable rendered page text for indexable pages.
  14. `content-index.json` shall expose route, title, description, canonical URL, language, tags or topics when available, and summary text suitable for lightweight discovery.
  15. `semantic-index.json` shall expose stable page identifiers, canonical URLs, page family, topic clusters, summaries, and related internal links suitable for retrieval-oriented consumers.
  16. `content-registry.json` shall expose source path when known, slug, canonical URL, robots disposition, sitemap inclusion, language metadata, generated artifact membership, rendered text hash or content hash, and source package metadata when known.
  17. `jsonld-graph.json` shall contain deterministic graph nodes for supported page, site, breadcrumb, FAQ, article, software, package, and product entities represented by compiled page intent and structured-data builders.
  18. Cache header manifest inputs shall classify root and child sitemap artifacts as mutable-revalidate unless a site profile explicitly fingerprints them.
  19. The builder shall return diagnostics rather than silently emitting contradictory artifacts.
  20. Artifact serialization shall be deterministic for the same compiled site and options.
  21. The package shall expose enough lower-level helpers for hosts that need to write only a subset of artifacts.
  22. Canonical URL derivation remains a compiled-site concern; discovery artifacts shall consume canonicals rather than re-deriving them ad hoc.
  23. Breadcrumb schema emission used for discovery-facing JSON-LD shall consume route semantics and `@mdwrk/structured-data` builders rather than inventing app-local breadcrumb rules.
  
  ## Acceptance
  
  Feature, test, claim, and evidence rows shall separately track basic sitemap generation, basic robots generation, basic `llms.txt` generation, root sitemap index generation, child sitemap URL-set generation, deterministic serialization, cache manifest coverage, crawler policy validation, index and registry agreement, JSON-LD graph coverage, host adoption, and content-pack mirroring. Passing evidence shall include reusable package tests and at least one product host smoke test.
