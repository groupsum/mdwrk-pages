body: |-
  ## Scope
  
  This SPEC defines fail-closed validation gates for generated portable lander discovery artifacts. It applies to `@mdwrk/lander-seo`, product hosts such as `apps/mdwrkcom`, and content packs that mirror generated artifacts.
  
  ## Requirements
  
  1. Validation shall compare generated artifacts against the compiled lander site rather than trusting file existence.
  2. Every indexable compiled page shall appear in child sitemap URL sets, `llms.txt`, `llms-full.txt`, `content-index.json`, `semantic-index.json`, `content-registry.json`, and page-relevant JSON-LD graph output unless a governed exception exists.
  3. Root `/sitemap.xml` shall parse as a sitemap index.
  4. Root `/sitemap.xml` shall not contain page URL entries.
  5. Every child sitemap referenced by the root sitemap index shall exist.
  6. Every child sitemap shall parse as a URL-set sitemap.
  7. Child sitemap URL sets shall contain page URL entries and shall not contain nested sitemap index entries.
  8. Noindex pages shall not appear in child sitemap URL sets or indexable discovery projections.
  9. Canonical URLs shall agree across child sitemap URL sets, content indexes, registry entries, JSON-LD graph IDs, Open Graph metadata, and page metadata.
  10. Robots output shall include configured AI crawler policies and shall reject localhost, loopback, or development port leakage.
  11. `llms-full.txt` shall include canonical URLs and rendered page text snippets for indexable pages.
  12. `content-index.json`, `semantic-index.json`, and `content-registry.json` shall agree on page identity, canonical URL, language, and robots disposition.
  13. `jsonld-graph.json` shall include deterministic WebSite and WebPage nodes for eligible pages and shall not claim unsupported product capabilities.
  14. Hreflang and alternate URL metadata, when present, shall agree across child sitemap URL sets, page metadata, content registry entries, and JSON-LD language fields.
  15. Root and child sitemap artifacts shall appear in cache header manifest inputs when the host emits cache policy artifacts.
  16. Mirrored content-pack generated artifacts shall match the product host build output byte-for-byte or by an explicitly governed canonicalization rule.
  17. Validation diagnostics shall identify the artifact, page, and field that failed.
  18. CI gates shall fail when required discovery artifacts are missing, malformed, stale, contradictory, or generated by an app-local divergent algorithm.
  
  ## Acceptance
  
  Feature, test, claim, and evidence rows shall cover positive and negative validation cases for root sitemap index structure, child sitemap existence, child URL-set structure, sitemap inclusion, noindex exclusion, robots crawler policy, LLM corpus coverage, content-index and registry agreement, semantic-index agreement, JSON-LD graph coverage, hreflang parity, cache manifest coverage, mirrored content-pack artifacts, and development URL leakage.
