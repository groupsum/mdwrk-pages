body: |-
  # Scope
  This SPEC defines the shared, domain-neutral API contract for `@mdwrk/lander-page-templates`.
  
  # Requirements
  The package must expose typed primitives for `PageTemplate`, `PageInstance`, `RelationshipRule`, `TemplateEdge`, `ResolvedTemplateLink`, `ResolvedLinkSlots`, `TemplateRenderContext`, `TemplateBundle`, and `TemplateGraph`.
  
  The package must expose helper functions for `definePageTemplate`, `definePageInstance`, `defineRelationship`, `defineEdge`, `defineTemplateBundle`, `defineTemplateGraph`, and `buildPageSpecFromTemplate`.
  
  The shared core must not encode education, support, legal, product, trust, package, comparison, marketing, or documentation-specific template kinds. Domain-specific packages and modules must specialize the core through typed aliases, unions, and bundles.
  
  Every page template must emit an `@mdwrk/lander-content-contract` `PageSpec` and must preserve compatibility with `@mdwrk/lander-core` and `@mdwrk/lander-react`.
  
  # Verification
  Smoke tests must prove that a generic template can be authored, instantiated downstream, resolved through a graph, and converted into a valid `PageSpec` without importing a product app.
