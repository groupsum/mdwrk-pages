body: |-
  # SPEC-2101: Lander React Structured Data Rendering Contract
  
  ## Scope
  
  This SPEC governs the visible and wrapper rendering contract for generated structured-data artifacts in `@mdwrk/lander-react-structured-data` and `@mdwrk/lander-react`.
  
  ## Requirements
  
  1. Generated `types`, `properties`, `enumerations`, and `datatypes` shall expose concrete wrapper and fused rendering surfaces when promoted.
  2. Generated surfaces shall accept direct top-level schema-backed fields rather than forcing an opaque nested payload wrapper as the only authored path.
  3. Visible fused surfaces shall render all present fields recursively in a deterministic way unless a governed fail-closed exception applies.
  4. All fused generated surfaces shall support `className`.
  5. Fused token ownership shall exist for every promoted generated artifact.
  6. Demo and fixture surfaces shall expose representative generated artifacts from each artifact kind.
  
  ## Acceptance
  
  Linked tests shall prove wrapper completeness, fused rendering completeness, className coverage, and token coverage for promoted generated artifacts.
