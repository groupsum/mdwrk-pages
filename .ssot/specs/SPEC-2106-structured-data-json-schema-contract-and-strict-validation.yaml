body: |-
  # SPEC-2106: Structured-data JSON Schema contract and strict validation
  
  ## Scope
  
  This SPEC governs generated structured-data schema validation and strict conformance behavior for promoted generated artifacts.
  
  ## Requirements
  
  1. Strict validation shall be backed by generated Schema.org schemas.
  2. Certification shall verify that promoted generated artifacts preserve all present schema-valid fields through contract, wrapper, and fused layers.
  3. Fail-closed omissions are allowed only when the omission itself is explicitly governed and tested.
  4. Schema-derived payloads shall be preferred for certification fixtures over hand-minimized samples.
  5. Validation and certification gates shall fail when promoted generated artifacts silently drop schema-valid fields.
  6. `.toStructuredData(props)` output shall be validatable through the same generated Schema.org schema contract as standalone component emission.
  7. Page-level graph collectors shall validate collected component contributions before final script emission.
  8. Graph de-duplication or normalization shall not silently drop schema-valid fields unless the omission is explicitly governed and tested.
  
  ## Acceptance
  
  Linked tests shall prove full-field conformance across generated artifact families and fail closed on field loss in standalone emission, `.toStructuredData` output, and collected page-level graphs.
