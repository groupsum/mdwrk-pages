body: |-
  # SPEC-2107: Generated Schema.org surface certification matrix
  
  ## Scope
  
  This SPEC defines the certification matrix for the promoted generated Schema.org surface across contract, wrapper, fused rendering, token coverage, and demo discoverability layers.
  
  ## Requirements
  
  1. The certification matrix shall track promoted generated `types`, `properties`, `enumerations`, and `datatypes`.
  2. For each promoted generated artifact family, the matrix shall record:
     - schema-backed contract coverage
     - wrapper coverage
     - fused visible coverage
     - `.toStructuredData` helper coverage
     - `.toStructuredData` strict-validation coverage
     - page-level graph collection coverage
     - local emission fallback parity
     - className coverage
     - dedicated token coverage
     - demo discoverability coverage
  3. Matrix artifacts shall be derived from code and generated inventories rather than maintained by hand.
  4. CI shall fail when matrix artifacts drift from repo truth.
  5. CI shall fail when a promoted generated artifact lacks required coverage in any certified layer.
  
  ## Acceptance
  
  Linked features and tests shall prove that the certification matrix is deterministic, code-derived, and fail-closed across visible rendering, structured-data helper output, page-level graph collection, and standalone emission fallback.
