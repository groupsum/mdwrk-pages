services:
  page-template-demo:
    build:
      context: ../..
      dockerfile: examples/page-template-demo/Dockerfile
    image: mdwrk-page-template-demo:local
    ports:
      - "4189:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
