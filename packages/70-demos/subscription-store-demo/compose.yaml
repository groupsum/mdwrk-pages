services:
  subscription-store-demo:
    build:
      context: ../..
      dockerfile: packages/70-demos/subscription-store-demo/Dockerfile
    image: mdwrk-subscription-store-demo:local
    ports:
      - "4192:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
